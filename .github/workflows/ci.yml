name: CI

on:
  push:
    branches: [main]
  pull_request:

# Concurrency at the workflow level so superseded PR runs cancel
# as a unit (every job in a run shares the same group). The four
# parallel jobs below all belong to one run; cancelling the run
# cancels every job in it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# PR-X3 (phase-a follow-up) split the prior monolithic `toolchain`
# job into four parallel jobs and sharded the test job 4-ways.
# Wall time on a green PR drops from ~27 min (the W1-bumped
# baseline) to ~6–8 min on the longest path. Trade-off: 4–5×
# actions-minutes for the same work, which on a public repo with
# unlimited free Linux minutes is pure upside.
#
# Job topology after X3:
#   - lint              (own runner)
#   - typecheck         (own runner)
#   - test (matrix 1/4..4/4, fail-fast: false)
#   - drift-and-fixtures (schema-drift + fixtures-must-fail-rules)
#   - prompt-injection-corpus (UNCHANGED from pre-X3)
#
# Branch-protection note for the operator: after this PR merges,
# update the required-checks list on `main` to reflect the new job
# names — `lint`, `typecheck`, `test (1)`, `test (2)`, `test (3)`,
# `test (4)`, `drift-and-fixtures`, `prompt-injection-corpus
# (deterministic tier)`. The old `toolchain` check name disappears
# and must be removed from the protection rule or new PRs will
# block on a check that never runs. See `docs/pilot-runbook.md`
# §12 for the documented list.

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @opencoo/eslint-plugin
        # The eslint plugin must be built before `pnpm lint` runs
        # because the root config consumes it via `workspace:*` and
        # ESLint imports its compiled `dist/` entry.
        run: pnpm --filter @opencoo/eslint-plugin build

      - name: Lint root
        run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @opencoo/eslint-plugin
        # `turbo run typecheck` doesn't depend on the eslint plugin
        # at the task graph level, but we keep the step here so the
        # lint job and the typecheck job have the same setup shape
        # — easier to reason about, and the plugin build is ~10s.
        run: pnpm --filter @opencoo/eslint-plugin build

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: test (${{ matrix.shard }})
    runs-on: ubuntu-latest
    # Per-shard timeout. On a green PR each shard finishes in
    # ~70–90s on a warm cache, ~3–5 min cold. 20 min keeps a wide
    # margin without masking a runaway test.
    timeout-minutes: 20
    strategy:
      # CRITICAL: do NOT cancel sibling shards on first failure.
      # We want every shard to report so the failure signal is
      # localised — "shard 3 failed" tells us where to look, while
      # a fail-fast cancel masks whether the issue is shard-local
      # or systemic.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @opencoo/eslint-plugin
        # Same shape as the other jobs.
        run: pnpm --filter @opencoo/eslint-plugin build

      - name: Build @opencoo/shared
        # Many tests across the workspace import `@opencoo/shared`
        # via subpath exports (`@opencoo/shared/db/schema`,
        # `@opencoo/shared/llm-router`, `@opencoo/shared/logger`,
        # `@opencoo/shared/wiki-write`, etc.) which resolve to
        # `dist/`. Vitest does not run tsc transparently, so we
        # build shared explicitly before the suite runs. This
        # mirrors the explanation in the prompt-injection-corpus
        # job below.
        run: pnpm --filter @opencoo/shared build

      - name: Build all packages
        # Required for cross-package tests. The CLI test suite (and
        # several engine-self-operating tests) imports peer workspace
        # packages via subpath exports that resolve to `dist/`. The
        # pre-X3 monolithic CI got the dist via `pnpm typecheck` +
        # `pnpm test` running through turbo's task graph; sharding
        # invokes vitest directly via `pnpm test -- --shard=...` and
        # bypasses turbo's `^build` dependency, so we materialise
        # every package's dist explicitly here.
        # Surfaced 2026-05-10 by PR #104 first-run shard failures
        # ("Failed to resolve entry for package
        # `@opencoo/engine-self-operating`").
        run: pnpm build

      - name: Test (shard ${{ matrix.shard }}/4)
        # Vitest 1.0+ supports native `--shard=N/M` partitioning
        # of the discovered test file set. The repo is on vitest
        # 3.2.4 (per the live-pilot config). Sharding partitions
        # files; it does not exclude any. Sum of per-shard test
        # counts equals the unsharded total.
        run: pnpm test -- --shard=${{ matrix.shard }}/4

  drift-and-fixtures:
    name: drift-and-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @opencoo/eslint-plugin
        # `pnpm lint:fixtures` invokes ESLint with the opencoo
        # plugin loaded; the plugin must be built first.
        run: pnpm --filter @opencoo/eslint-plugin build

      - name: "Schema drift check"
        shell: bash
        run: |
          pnpm --filter @opencoo/shared db:check
          pnpm --filter @opencoo/shared db:generate
          if ! git diff --exit-code packages/shared/drizzle/; then
            echo "::error::schema drift: packages/shared/src/db/schema/** changed without running db:generate. Run 'pnpm --filter @opencoo/shared db:generate' and commit the result."
            exit 1
          fi

      - name: "Fixtures must fail the expected rules"
        shell: bash
        run: |
          set +e
          output=$(pnpm lint:fixtures 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            echo "::error::pnpm lint:fixtures exited 0; the fixtures must fail to prove the rules are wired."
            exit 1
          fi
          for rule in \
            "opencoo/no-cross-engine-import" \
            "opencoo/no-direct-gitea-write" \
            "opencoo/no-direct-llm-sdk" \
            "opencoo/no-feature-env-vars" \
            "opencoo/no-update-append-only"; do
            if ! echo "$output" | grep -q "$rule"; then
              echo "::error::Expected rule id '$rule' to appear in lint:fixtures output."
              exit 1
            fi
          done
          echo "All five boundary rules fired on the negative fixtures."

  prompt-injection-corpus:
    # Phase-a ship-blocker per IMPLEMENTATION-PLAN.md §1.2.8 row 31
    # and THREAT-MODEL.md §4.2. Runs in deterministic-stub mode by
    # default — no LLM provider is contacted. The optional real-LLM
    # tier lives in `injection-real-llm.yml` (manual workflow_dispatch).
    #
    # UNCHANGED by PR-X3 — already runs in parallel with the rest
    # of the workflow as a separate job.
    name: prompt-injection-corpus (deterministic tier)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @opencoo/eslint-plugin
        run: pnpm --filter @opencoo/eslint-plugin build

      - name: "Fixture-regen drift guard"
        # If a contributor edited a fixture by hand without
        # updating the generator template, this catches it before
        # the suite runs and the failing test surfaces opaquely.
        run: pnpm fixtures:check

      - name: Build @opencoo/shared
        # The engine-ingestion classifier injection test imports
        # `@opencoo/shared/llm-router` via the package's subpath
        # exports (which resolve to `dist/`). Vitest doesn't run
        # tsc transparently, so we build shared explicitly before
        # the injection suite so subpath imports resolve.
        run: pnpm --filter @opencoo/shared build

      - name: "Run injection corpus (deterministic tier)"
        run: pnpm test:injection
